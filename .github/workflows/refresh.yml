name: Refresh catalog

on:
  schedule:
    - cron: '0 5 * * *' # daily 05:00 UTC — the catalog stays current hands-free
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh liveness + freshness
        id: refresh
        # dead links make the step fail AFTER writing the report — keep going
        # so the safe freshness bumps still land for review
        continue-on-error: true
        env:
          # optional: unlock the Kaggle metadata adapter (Settings → Secrets)
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: npm run refresh

      - name: Validate refreshed catalog
        run: npm run validate

      - name: Unit tests
        run: npm test

      # Machine-verified metadata (freshness bumps, verified stamps, the
      # generated date) commits straight to main — validate + tests above are
      # the gate, and the Pages deploy follows automatically. Dead links are
      # the one case that needs a human: those go to a PR instead.
      - name: Commit safe refresh directly
        if: steps.refresh.outcome == 'success'
        run: |
          if git diff --quiet; then
            echo "catalog already current"
            exit 0
          fi
          git config user.name "atlas-refresh-bot"
          git config user.email "actions@github.com"
          git add data/catalog.json
          git commit -m "Automated daily refresh: liveness sweep + freshness bumps"
          git push

      - name: Open PR when dead links need a human
        if: steps.refresh.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "no catalog changes to propose"
          else
            BRANCH="catalog-refresh-$(date +%Y%m%d)"
            git config user.name "atlas-refresh-bot"
            git config user.email "actions@github.com"
            git checkout -b "$BRANCH"
            git add data/catalog.json
            git commit -m "Catalog refresh with dead links flagged — review required"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "Catalog refresh $(date +%Y-%m-%d): dead links need review" \
              --body "The daily refresh found dead links (listed in the workflow log). Replace or drop those entries, then merge the accompanying freshness updates." \
              --base main --head "$BRANCH"
          fi
          echo "::error::Dead links detected — see the refresh step log"
          exit 1
