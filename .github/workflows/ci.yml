name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # zero dependencies by design — no npm install step
      - name: Syntax-check every module
        run: |
          for f in $(find js scripts tests -name '*.js'); do
            node --check "$f"
          done

      - name: Unit tests
        run: npm test

      - name: Validate catalog
        run: npm run validate
